<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPDB SMKN 1 Pajangan</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 10px;
            font-family: Arial, sans-serif;
            background-color: #1a252f;
            color: #ffffff;
        }
        
        .bingkai-header {
            background-color: #2c3e50;
            padding: 15px;
            text-align: center;
            border: 3px solid #3498db;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .dashboard-container {
            display: flex;
            flex-direction: row; /* Jejer ke samping di layar lebar */
            gap: 10px;
            height: 70vh;
        }

        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #3498db;
        }

        .judul-jurusan {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }

        iframe { flex: 1; width: 100%; border: none; }

        /* KUNCI PERBAIKAN: Tampilan untuk HP */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column; /* Ubah jadi ke bawah di HP */
                height: auto;
            }
            .kolom {
                height: 400px; /* Berikan tinggi yang cukup agar data terbaca */
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bingkai-header">
        <h1>📊 MONITORING PPDB</h1>
        <p>SMK NEGERI 1 PAJANGAN</p>
    </div>

    <div class="dashboard-container">
        <div class="kolom">
            <div class="judul-jurusan">💻 RPL</div>
            <iframe src="https://yogyaprov.spmb.id/" title="RPL"></iframe>
        </div>
        <div class="kolom">
            <div class="judul-jurusan">📐 DPIB</div>
            <iframe src="https://yogyaprov.spmb.id/" title="DPIB"></iframe>
        </div>
        <div class="kolom">
            <div class="judul-jurusan">🧱 KKKR</div>
            <iframe src="https://yogyaprov.spmb.id/" title="KKKR"></iframe>
        </div>
    </div>

</body>
</html>
