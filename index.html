<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPDB SMKN 1 Pajangan</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 4px; /* Padding layar diperkecil drastis */
            font-family: Arial, sans-serif;
            background-color: #1a252f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Membiarkan layar bisa di-scroll ke bawah */
        }
        
        /* Setelan Bingkai Atas */
        .bingkai-header {
            background-color: #2c3e50;
            padding: 6px; /* Dibuat sangat tipis */
            text-align: center;
            border: 1px solid #3498db;
            border-radius: 5px;
            margin-bottom: 4px; /* Jarak bawah sangat tipis */
        }
        .bingkai-header h1 {
            margin: 2px 0;
            font-size: 14px;
        }
        .bingkai-header p {
            margin: 0;
            font-size: 10px;
        }
        
        .dashboard-container {
            display: flex;
            flex-direction: row;
            gap: 4px; /* Jarak pembatas antar jurusan ditipiskan */
            flex: 1;
        }

        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #3498db;
        }

        .judul-jurusan {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 5px;
            font-weight: bold;
            font-size: 12px;
        }

        iframe { 
            flex: 1; 
            width: 100%; 
            border: none; 
        }

        /* Setelan Layar HP */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .kolom {
                height: 90vh; /* KUNCI: Setiap jurusan mengambil 90% tinggi layar HP */
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="bingkai-header">
        <h1>📊 MONITORING PPDB SMK NEGERI 1 PAJANGAN</h1>
        <p>👨‍💻 Dibuat oleh Sie Operator</p>
    </div>

    <div class="dashboard-container">
        <div class="kolom">
            <div class="judul-jurusan">💻 RPL</div>
            <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/65/simple" title="RPL"></iframe>
        </div>
        
        <div class="kolom">
            <div class="judul-jurusan">📐 DPIB</div>
            <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/64/simple" title="DPIB"></iframe>
        </div>
        
        <div class="kolom">
            <div class="judul-jurusan">🧱 KKKR / KRIYA</div>
            <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/66/simple" title="KKKR"></iframe>
        </div>
    </div>

</body>
</html>
