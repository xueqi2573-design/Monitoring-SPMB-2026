<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPDB SMKN 1 Pajangan</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 4px;
            font-family: Arial, sans-serif;
            background-color: #1a252f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Setelan Bingkai Atas */
        .bingkai-header {
            background-color: #2c3e50;
            padding: 6px;
            text-align: center;
            border: 1px solid #3498db;
            border-radius: 5px;
            margin-bottom: 4px;
        }
        .bingkai-header h1 {
            margin: 2px 0;
            font-size: 14px;
        }
        .bingkai-header p {
            margin: 0;
            font-size: 10px;
        }
        
        .dashboard-container {
            display: flex;
            flex-direction: row;
            gap: 4px;
            flex: 1;
        }

        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #3498db;
        }

        .judul-jurusan {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 5px;
            font-weight: bold;
            font-size: 12px;
            z-index: 10; /* Menjaga agar judul tetap di lapisan atas */
            position: relative;
        }

        /* Wadah khusus untuk mengunci ukuran iframe */
        .wadah-iframe {
            flex: 1;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* Setelan dasar Iframe */
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%;
            border: none; 
        }

        /* TRIK ZOOM OUT: Khusus untuk layar HP */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .kolom {
                height: 85vh; /* Menyediakan ruang vertikal yang cukup */
                margin-bottom: 6px;
            }
            
            iframe {
                width: 200%;      /* Lebar dipaksa 2 kali lipat agar layout dinas mekar */
                height: 200%;     /* Tinggi dipaksa 2 kali lipat untuk kompensasi zoom */
                transform: scale(0.5); /* Tampilan disusutkan menjadi 50% (Zoom Out) */
                transform-origin: 0 0; /* Titik pusat zoom dari pojok kiri atas */
            }
        }
    </style>
</head>
<body>

    <div class="bingkai-header">
        <h1>📊 MONITORING PPDB SMK NEGERI 1 PAJANGAN</h1>
        <p>👨‍💻 Dibuat oleh Sie Operator</p>
    </div>

    <div class="dashboard-container">
        <!-- Kolom RPL -->
        <div class="kolom">
            <div class="judul-jurusan">💻 RPL</div>
            <div class="wadah-iframe">
                <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/65/simple" title="RPL"></iframe>
            </div>
        </div>
        
        <!-- Kolom DPIB -->
        <div class="kolom">
            <div class="judul-jurusan">📐 DPIB</div>
            <div class="wadah-iframe">
                <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/64/simple" title="DPIB"></iframe>
            </div>
        </div>
        
        <!-- Kolom KKKR / KRIYA -->
        <div class="kolom">
            <div class="judul-jurusan">🧱 KKKR / KRIYA</div>
            <div class="wadah-iframe">
                <iframe src="https://yogyaprov.spmb.id/020301/hasil/1000083/seleksi/66/simple" title="KKKR"></iframe>
            </div>
        </div>
    </div>

</body>
</html>
