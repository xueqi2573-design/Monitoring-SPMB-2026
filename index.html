<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPDB SMKN 1 Pajangan</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 8px;
            font-family: Arial, sans-serif;
            background-color: #1a252f;
            color: #ffffff;
        }
        
        /* Setelan Layar Laptop/PC */
        .bingkai-header {
            background-color: #2c3e50;
            padding: 15px;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .bingkai-header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        .bingkai-header p {
            margin: 0;
            font-size: 14px;
        }
        
        .dashboard-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            height: 75vh;
        }

        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #3498db;
        }

        .judul-jurusan {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        iframe { flex: 1; width: 100%; border: none; }

        /* KUNCI PERBAIKAN: Tampilan Khusus HP */
        @media (max-width: 768px) {
            .bingkai-header {
                padding: 8px; /* Padding dipangkas habis agar kotak mengecil */
                margin-bottom: 8px;
            }
            .bingkai-header h1 {
                font-size: 15px; /* Ukuran font judul dikecilkan drastis */
                margin-bottom: 2px;
            }
            .bingkai-header p {
                font-size: 11px; /* Ukuran font sub-judul dikecilkan */
            }
            .dashboard-container {
                flex-direction: column;
                height: auto;
            }
            .kolom {
                height: 550px; /* Kotak iframe diperpanjang ke bawah agar data lebih terlihat */
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="bingkai-header">
        <h1>📊 MONITORING PPDB SMK NEGERI 1 PAJANGAN</h1>
        <p>👨‍💻 Dibuat oleh Sie Operator</p>
    </div>

    <div class="dashboard-container">
        <div class="kolom">
            <div class="judul-jurusan">💻 RPL</div>
            <iframe src="https://yogyaprov.spmb.id/" title="RPL"></iframe>
        </div>
        <div class="kolom">
            <div class="judul-jurusan">📐 DPIB</div>
            <iframe src="https://yogyaprov.spmb.id/" title="DPIB"></iframe>
        </div>
        <div class="kolom">
            <div class="judul-jurusan">🧱 KKKR</div>
            <iframe src="https://yogyaprov.spmb.id/" title="KKKR"></iframe>
        </div>
    </div>

</body>
</html>
