<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Baris auto-refresh telah Dihapus -->
    <title>Dashboard Monitoring PPDB SMKN 1 Pajangan</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a252f;
            color: #ffffff;
        }
        
        /* BINGKAI UTAMA DI BAGIAN ATAS */
        .bingkai-header {
            background-color: #2c3e50;
            margin: 15px 15px 10px 15px;
            padding: 18px;
            text-align: center;
            border: 3px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .bingkai-header h1 {
            margin: 0 0 6px 0;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ecf0f1;
            font-weight: 700;
        }
        .bingkai-header p {
            margin: 0;
            font-size: 14px;
            color: #bdc3c7;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* AREA KONTEN UTAMA (3 KOLOM JURUSAN) */
        .dashboard-container {
            display: flex;
            flex: 1;
            margin: 5px 15px 15px 15px;
            gap: 15px;
        }
        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .judul-jurusan {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Bingkai Header Atas -->
    <div class="bingkai-header">
        <h1>📊 MONITORING SISWA BARU SMK NEGERI 1 PAJANGAN</h1>
        <p>👨‍💻 Dibuat oleh Sie Operator</p>
    </div>

    <!-- Wadah 3 Jurusan Paralel -->
    <div class="dashboard-container">
        
        <!-- Kolom 1: RPL -->
        <div class="kolom">
            <div class="judul-jurusan">💻 RPL</div>
            <iframe src="https://yogyaprov.spmb.id/020101/hasil/1000083/seleksi/65/simple" title="Pemantauan RPL"></iframe>
        </div>

        <!-- Kolom 2: DPIB -->
        <div class="kolom">
            <div class="judul-jurusan">📐 DPIB</div>
            <iframe src="https://yogyaprov.spmb.id/020101/hasil/1000083/seleksi/64/simple" title="Pemantauan DPIB"></iframe>
        </div>

        <!-- Kolom 3: KKKR -->
        <div class="kolom">
            <div class="judul-jurusan">🧱 KKKR</div>
            <iframe src="https://yogyaprov.spmb.id/020101/hasil/1000083/seleksi/66/simple" title="Pemantauan KKKR"></iframe>
        </div>

    </div>

</body>
</html>
